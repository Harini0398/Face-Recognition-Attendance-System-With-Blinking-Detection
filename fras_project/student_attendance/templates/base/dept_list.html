
<html>
    <head>
        <title>department list management</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    </head>

    <style>

        .dept-head{
            height: 5%;
            width: 100%;
            background-color: rgb(3, 48, 107);
            color: white;
        }

        .dept-content{
            padding-top: 5%;
        }

        .dept-head a{
            color: white;
            text-decoration: none;
            padding: 20%;
        }

    </style>

    <body>

        <div class="dept-head d-flex align-items-center gap-3 mb-4">

            
            <h4><a href="{% url 'admin_homepage' %}" ><i class="bi bi-arrow-left-circle-fill"></i></a></h4>
            <h4> Department List</h4>

        </div>

        <div class="dept-content">

            <h5>Total Departments:{{total_department}}</h5><br><br>

            <a href="{% url 'admin_deptform' %}" class="btn btn-primary"><i class="bi bi-building-add"></i> add department</a><br><br>
            
            

            <table class="table table-bordered table-striped align-middle text-center shadow-sm">
                <tr>
                    <td><h5>Departments</h5></td>
            
                </tr>
                {% for department in department_list %}

                <tr>
                    <td>{{department.Name}}</td>
                    <td><a href="{% url 'deptupdate' department.id %}" class="btn btn-primary"><i class="bi bi-pencil-square"></i> edit</a></td>
                    <td><a href="{% url 'deptdelete' department.id %}" class="btn btn-primary"><i class="bi bi-trash"></i> delete</a></td>
                    
                </tr>
            {% endfor %}
        </table>

       </div>

       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        
    </body>
</html>
